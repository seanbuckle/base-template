name: "🚀 Feature Request"
description: "Propose a new idea or functionality for this project."
title: "[FEAT]: <Short Description>"
labels: ["feat"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to suggest a new feature!
  - type: textarea
    id: summary
    attributes:
      label: "🎯 Summary"
      description: "What is the core problem you are trying to solve, or what value does this add?"
      placeholder: "e.g., We need a way to export data to CSV to save time on manual reporting."
    validations:
      required: true
  - type: textarea
    id: proposed-solution
    attributes:
      label: "🛠️ Proposed Solution"
      description: "Describe the change or new functionality you would like to see implemented."
      placeholder: "Describe the logic, workflow, or interface changes..."
    validations:
      required: true
  - type: checkboxes
    id: checklist
    attributes:
      label: "🚦 Quality Check"
      options:
        - label: "I have checked existing issues to ensure this hasn't been proposed yet."
          required: true
        - label: "This feature aligns with the overall goals of the project."
          required: true
  - type: textarea
    id: context
    attributes:
      label: "🔗 Additional Context"
      description: "Add any other context, mockups, or screenshots here."
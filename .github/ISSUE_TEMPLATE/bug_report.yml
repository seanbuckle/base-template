name: "🐛 Bug Report"
description: "Report a software error or logic flaw."
title: "[FIX]: <Short Description>"
labels: ["fix", "priority: high"]
body:
  - type: markdown
    attributes:
      value: |
        Please provide as much detail as possible to help us reproduce and resolve the bug quickly.
  - type: textarea
    id: description
    attributes:
      label: "🐞 Describe the Bug"
      description: "A clear and concise description of the error."
      placeholder: "e.g., The application crashes when clicking the 'Save' button while offline..."
    validations:
      required: true
  - type: textarea
    id: expected-actual
    attributes:
      label: "🔄 Expected vs Actual"
      description: "What should have happened vs what actually happened?"
      placeholder: "Expected: A warning message. Actual: An unhandled exception (500 error)."
    validations:
      required: true
  - type: textarea
    id: reproduction-steps
    attributes:
      label: "🛤️ Steps to Reproduce"
      description: "How can we make this happen again?"
      value: |
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: "⚡ Severity"
      description: "How much does this impact your work?"
      options:
        - "Critical (Complete blocker)"
        - "Major (Workaround exists)"
        - "Minor (Visual/UI only)"
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: "📁 Additional Context"
      description: "Operating system, browser version, or links to logs/screenshots."
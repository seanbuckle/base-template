- name: "automated"
  color: "f4f4f4" # Lightest grey - subtle for bot noise
  description: "Issues or pull requests generated by automation and bots."

- name: "breaking-change"
  color: "d93f0b" # Deep safety orange - high alert
  description: "Changes that break backward compatibility or existing contracts."

- name: "chore"
  color: "efdbff" # Soft lavender - distinct from code changes
  description: "Routine maintenance, tooling updates, or configuration changes."

- name: "dependencies"
  color: "0366d6" # GitHub standard blue - familiar for updates
  description: "Updates to project dependencies or package versions."

- name: "docs"
  color: "0075ca" # Professional blue
  description: "Improvements or additions to documentation and comments."

- name: "feat"
  color: "0e8a16" # Success green - indicates new value
  description: "New features or functional improvements."

- name: "fix"
  color: "d73a4a" # Classic error red
  description: "Something isn't working as expected."

- name: "github-actions"
  color: "1d76db" # Action blue - distinct from docs
  description: "Changes related to CI/CD pipelines and GitHub workflows."

- name: "in-progress"
  color: "fef2c0" # Muted yellow - indicates "in the works"
  description: "Task is currently being actively developed."

- name: "on-hold"
  color: "666666" # Dimmed grey - visually "dead" until moved
  description: "Development is paused or blocked by external factors."

- name: "priority: high"
  color: "b60205" # Blood red - highest visual weight
  description: "High priority; requires attention in the current cycle."

- name: "refactor"
  color: "bfd4f2" # Ice blue - clean and structural
  description: "Code changes that improve structure without altering behavior."

- name: "security"
  color: "0052cc" # Trust blue - standard for security
  description: "Critical security fixes or policy updates."

- name: "test"
  color: "c5def5" # Light sky blue - keeps tests feeling "lightweight"
  description: "Additions or corrections to the test suite."